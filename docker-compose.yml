name: options-tracker

# Self-hosted, read-only options-selling dashboard.
# Only the `frontend` (nginx) publishes a host port. The gateway, backend, db
# and redis are reachable ONLY on this private internal network.

# Cap per-container log growth so a 24/7 box can't fill its disk with logs.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# One IBEAM gateway per IBKR login: IBKR won't hold two Client Portal sessions
# on one login, so each user needs their own container with their own creds.
# Everything except the credentials and the outputs volume is identical, so it
# is defined once here and merged into each gateway service.
x-ibeam-common: &ibeam-common
  # Pinned by digest for reproducible 24/7 builds (was :latest). To update,
  # pull a newer voyz/ibeam, test login, then replace this digest.
  image: voyz/ibeam@sha256:6a9e1eb91c82235f8e52ec615c1686e2ca8254a758fc438d9ed1b10682508ec3
  restart: "no"
  healthcheck:
    # Image is Python-based; just confirm the gateway port is accepting TCP.
    test: ["CMD-SHELL", "python -c \"import socket;socket.create_connection(('127.0.0.1',5000),3)\""]
    interval: 15s
    timeout: 5s
    retries: 10
    start_period: 40s
  networks: [internal]
  logging: *default-logging
  mem_limit: 1536m
  # Never published to the host's public interface.

x-ibeam-env: &ibeam-env
  # Disable periodic auto-maintenance — auth is user-initiated via the backend.
  # Use a large value (24h) because IBEAM treats 0 as 1 second.
  IBEAM_MAINTENANCE_INTERVAL: ${IBEAM_MAINTENANCE_INTERVAL:-86400}
  IBEAM_PAGE_LOAD_TIMEOUT: ${IBEAM_PAGE_LOAD_TIMEOUT:-60}
  # Prevent automatic retry of failed logins — avoids unsolicited MFA pushes.
  IBEAM_RESTART_FAILED_SESSIONS: "false"
  IBEAM_MAX_FAILED_AUTH: "1"
  # IBKR login page selectors — IBKR changes these periodically.
  # Override with resilient defaults that work regardless of class names.
  IBEAM_USER_NAME_EL: NAME@@user_name
  IBEAM_SUBMIT_EL: CSS_SELECTOR@@button[type="submit"]
  # Try authentication strategy A — the older, more robust login flow.
  IBEAM_AUTHENTICATION_STRATEGY: "A"
  # Give OAuth more time and save screenshots on failure for debugging.
  IBEAM_OAUTH_TIMEOUT: "60"
  IBEAM_ERROR_SCREENSHOTS: "true"
  # Manual 2FA — user approves push on phone, IBEAM polls gateway auth status.
  IBEAM_MANUAL_TWO_FA: "true"
  # 2FA input field — IBKR renamed from "bronze" to "silver" in 2026.
  IBEAM_TWO_FA_INPUT_EL_ID: ID@@xyz-field-silver-response
  # Advanced (optional): to store the password Fernet-encrypted, uncomment the
  # next line and set IBEAM_KEY to a 32-byte url-safe base64 key in .env.
  # Leave it OUT for a plaintext password — an EMPTY key makes login fail.
  # IBEAM_KEY: ${IBEAM_KEY}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-options}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-options}
      POSTGRES_DB: ${POSTGRES_DB:-options}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-options} -d ${POSTGRES_DB:-options}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    logging: *default-logging
    mem_limit: 512m
    # Not published to the host. Uncomment for local DB debugging only:
    # ports: ["127.0.0.1:5432:5432"]

  # User 1's gateway (IBKR_USER1_GATEWAY_URL).
  ibkr-gateway:
    <<: *ibeam-common
    environment:
      <<: *ibeam-env
      IBEAM_ACCOUNT: ${IBEAM_ACCOUNT:?set IBEAM_ACCOUNT in .env}
      IBEAM_PASSWORD: ${IBEAM_PASSWORD:?set IBEAM_PASSWORD in .env}
    volumes:
      # Widen the gateway's IP allowlist to the Compose network, otherwise it
      # returns "Access Denied" to the backend. Single-file mount (safe), and
      # read-only so neither gateway can rewrite the other's allowlist.
      - ./gateway/conf.yaml:/srv/clientportal.gw/root/conf.yaml:ro
      # IBEAM writes its log + debug screenshots here on every boot. Use a named
      # volume (NOT a host bind mount): on a fresh clone the bind-mount dir is
      # created root-owned, and the non-root gateway user can't write to it, which
      # crashes the container at startup (PermissionError on ibeam_log...). A named
      # volume is initialized writable for the container user. Retrieve files with:
      #   docker compose cp ibkr-gateway:/srv/outputs ./gateway-outputs
      - gateway-outputs:/srv/outputs

  # User 2's gateway (IBKR_USER2_GATEWAY_URL). Idle and costing nothing until
  # that user clicks "Pull Fresh Data" — restart: "no" means it only runs when
  # the backend starts it, and the backend needs the container to exist to do
  # that (hence no compose profile). Leave IBEAM_ACCOUNT_2 unset for a
  # single-user deployment: the container is created but never started.
  ibkr-gateway-2:
    <<: *ibeam-common
    environment:
      <<: *ibeam-env
      IBEAM_ACCOUNT: ${IBEAM_ACCOUNT_2:-}
      IBEAM_PASSWORD: ${IBEAM_PASSWORD_2:-}
    volumes:
      - ./gateway/conf.yaml:/srv/clientportal.gw/root/conf.yaml:ro
      - gateway-outputs-2:/srv/outputs

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-options}:${POSTGRES_PASSWORD:-options}@db:5432/${POSTGRES_DB:-options}
      IBKR_GATEWAY_URL: ${IBKR_GATEWAY_URL:-https://ibkr-gateway:5000/v1/api}
      IBKR_GATEWAY_VERIFY: ${IBKR_GATEWAY_VERIFY:-false}
      IBKR_ACCOUNT_ID: ${IBKR_ACCOUNT_ID:-}
      REDIS_URL: ${REDIS_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POLL_HEARTBEAT_SECONDS: ${POLL_HEARTBEAT_SECONDS:-45}
      POLL_POSITIONS_SECONDS: ${POLL_POSITIONS_SECONDS:-300}
      POLL_MARKETDATA_SECONDS: ${POLL_MARKETDATA_SECONDS:-300}
      POLL_TRADES_SECONDS: ${POLL_TRADES_SECONDS:-300}
      POLL_MARKET_SECONDS: ${POLL_MARKET_SECONDS:-300}
      POLL_BURST_SECONDS: ${POLL_BURST_SECONDS:-20}
      POLL_BURST_WINDOW_SECONDS: ${POLL_BURST_WINDOW_SECONDS:-300}
      POLL_PUBLIC_PRICE_SECONDS: ${POLL_PUBLIC_PRICE_SECONDS:-300}
      # Must comfortably exceed IBEAM startup (page-load + oauth, ~120s) AND fit
      # under nginx proxy_read_timeout (180s). 45s was too tight — logins timed
      # out before the 2FA push could be approved.
      PULL_LOGIN_TIMEOUT_SECONDS: ${PULL_LOGIN_TIMEOUT_SECONDS:-120}
      DOCKER_IBEAM_CONTAINER: ${DOCKER_IBEAM_CONTAINER:-options-tracker-ibkr-gateway-1}
      # IBKR Flex Web Service — one-time setup in IBKR Account Management (see README).
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:-}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID:-}
      # Per-user gateways. With no IBKR_USER1_* set, the backend falls back to
      # the legacy single-user vars above, so an existing .env keeps working.
      IBKR_USER1_LABEL: ${IBKR_USER1_LABEL:-}
      IBKR_USER1_GATEWAY_URL: ${IBKR_USER1_GATEWAY_URL:-}
      IBKR_USER1_CONTAINER: ${IBKR_USER1_CONTAINER:-}
      IBKR_USER1_ACCOUNT_ID: ${IBKR_USER1_ACCOUNT_ID:-}
      IBKR_USER1_FLEX_TOKEN: ${IBKR_USER1_FLEX_TOKEN:-}
      IBKR_USER1_FLEX_QUERY_ID: ${IBKR_USER1_FLEX_QUERY_ID:-}
      IBKR_USER2_LABEL: ${IBKR_USER2_LABEL:-}
      IBKR_USER2_GATEWAY_URL: ${IBKR_USER2_GATEWAY_URL:-}
      IBKR_USER2_CONTAINER: ${IBKR_USER2_CONTAINER:-}
      IBKR_USER2_ACCOUNT_ID: ${IBKR_USER2_ACCOUNT_ID:-}
      IBKR_USER2_FLEX_TOKEN: ${IBKR_USER2_FLEX_TOKEN:-}
      IBKR_USER2_FLEX_QUERY_ID: ${IBKR_USER2_FLEX_QUERY_ID:-}
      # In-app login (single shared account). See README for the hash-CLI command.
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-168}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      # NOT service_healthy: the gateway may be unauthenticated/awaiting 2FA at
      # boot, which is a normal state the backend surfaces as DISCONNECTED.
      ibkr-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [internal]
    logging: *default-logging
    mem_limit: 768m

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      # The ONLY host-published port. Binds to localhost only by default; set
      # APP_BIND to a LAN/VPN interface IP in .env to reach it from elsewhere.
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8443}:8443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [internal]
    logging: *default-logging
    mem_limit: 192m

  # Nightly Postgres backup. Dumps a gzipped pg_dump into ./backups on the host
  # and prunes dumps older than BACKUP_KEEP_DAYS, so 24/7 history survives a lost
  # pgdata volume. Restore: gunzip -c backups/<file>.sql.gz | docker compose exec -T db psql -U options -d options
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-options}
      PGPASSWORD: ${POSTGRES_PASSWORD:-options}
      PGDATABASE: ${POSTGRES_DB:-options}
    volumes:
      - ./backups:/backups
    networks: [internal]
    logging: *default-logging
    mem_limit: 256m
    entrypoint:
      - /bin/sh
      - -c
      - |
        keep=${BACKUP_KEEP_DAYS:-7}; interval=${BACKUP_INTERVAL_SECONDS:-86400}
        echo "[db-backup] started; interval=$${interval}s keep=$${keep}d -> /backups"
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S); out="/backups/options-$$ts.sql.gz"
          if pg_dump | gzip > "$$out"; then
            echo "[db-backup] wrote $$out ($$(du -h "$$out" | cut -f1))"
          else
            echo "[db-backup] FAILED at $$ts" >&2; rm -f "$$out"
          fi
          find /backups -name 'options-*.sql.gz' -mtime +$$keep -delete 2>/dev/null || true
          sleep "$$interval"
        done

  # Optional. Enabled only with:  docker compose --profile redis up
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["redis"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [internal]
    logging: *default-logging
    mem_limit: 128m

volumes:
  pgdata:
  gateway-outputs:
  gateway-outputs-2:

networks:
  internal:
    driver: bridge
